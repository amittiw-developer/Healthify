<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthiFy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",system-ui,Arial;
}

/* FULL SCREEN APP SPLASH */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(160deg,#0F9D58 0%, #15b86a 45%, #eaf7f1 100%);
}

/* MAIN BOX */
.splash{
    text-align:center;
    animation:fadeIn 0.8s ease;
    padding:20px;
}

/* ICON LOGO */
.splash-logo{
    width:110px;
    max-width:35vw;
    margin-bottom:18px;
    animation:logoPop 0.9s cubic-bezier(.17,.67,.3,1.3);
}

/* BRAND TEXT */
.splash-title{
    font-size:34px;
    font-weight:700;
    letter-spacing:1px;
    color:#0b6b3c;
}

/* TAGLINE */
.splash-tagline{
    font-size:14px;
    margin-top:6px;
    color:#1b8c52;
    opacity:0.9;
}

/* LOADER DOTS */
.loader{
    margin-top:28px;
    display:flex;
    justify-content:center;
    gap:6px;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#0F9D58;
    animation:bounce 1.2s infinite ease-in-out;
}

.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

/* ANIMATIONS */

@keyframes fadeIn{
    from{opacity:0; transform:translateY(8px)}
    to{opacity:1; transform:translateY(0)}
}

@keyframes logoPop{
    0%{transform:scale(.6); opacity:0}
    70%{transform:scale(1.1)}
    100%{transform:scale(1)}
}

@keyframes bounce{
    0%,80%,100%{transform:scale(.3);opacity:.3}
    40%{transform:scale(1);opacity:1}
}

/* MOBILE */
@media(max-width:600px){
    .splash-title{font-size:28px;}
    .splash-logo{width:90px;}
}

</style>
</head>

<body>

<div class="splash">

    <img src="{{ url_for('static', filename='logo-icon.png') }}" class="splash-logo">

    <div class="splash-title">Healthify</div>

    <div class="splash-tagline">AI-Powered Health Insights</div>

    <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

</div>

<script>
setTimeout(()=>{
    window.location.href="/home";
},2300);
</script>

</body>
</html>
