<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparing • Healthify</title>

<style>

body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(#f4f7f6,#eef3f1);
}

/* header spacing */
.page{
    padding-top:90px;
    min-height:calc(100vh - 90px);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* card */
.card{
    background:white;
    padding:40px 28px;
    border-radius:18px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
    width:92%;
    max-width:380px;
    animation:fadeUp .4s ease;
}

/* icon */
.logo{
    width:72px;
    margin-bottom:18px;
}

/* spinner */
.loader{
    width:60px;
    height:60px;
    border:6px solid #e5e7eb;
    border-top:6px solid #0F9D58;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

.title{
    font-size:20px;
    font-weight:600;
    color:#0F9D58;
}

.subtitle{
    font-size:14px;
    color:#6b7280;
    margin-top:6px;
}

/* progress dots */
.dots{
    margin-top:15px;
    color:#0F9D58;
    font-weight:600;
    letter-spacing:2px;
    animation:blink 1.4s infinite;
}

@keyframes blink{
    0%,80%,100%{opacity:0}
    40%{opacity:1}
}

/* trust text */
.note{
    margin-top:22px;
    font-size:12px;
    color:#9ca3af;
}

/* animation */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(12px)}
    to{opacity:1; transform:translateY(0)}
}

/* mobile */
@media(max-width:600px){
    .card{ padding:35px 22px; }
}

</style>
</head>

<body>

{% include 'header.html' %}

<div class="page">

<div class="card">

    <img src="{{ url_for('static', filename='logo-icon.png') }}" class="logo">

    <div class="title">Preparing your session</div>
    <div class="subtitle">Initializing Healthify AI engine</div>

    <div class="loader"></div>

    <div class="dots">...</div>

    <div class="note">
        Secure & private • No medical data stored permanently
    </div>

</div>
</div>

<script>

/* redirect after init */
setTimeout(()=>{
    window.location.replace("/analyzing");
},2000);

/* prevent back loop */
history.replaceState(null,null,location.href);
window.onpopstate=function(){
    window.location.href="/home";
}

</script>

</body>
</html>
