<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | Healthify</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#f7fbf8,#e5f5ed);display:flex;align-items:center;justify-content:center;padding:24px;color:#10201a}.card{width:min(560px,100%);background:white;border:1px solid #dbe9e2;border-radius:14px;padding:34px;box-shadow:0 24px 70px rgba(16,32,26,.13);animation:up .4s ease}@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.logo{text-align:center;margin-bottom:18px}.logo img{height:54px}h1{margin:0 0 8px}.sub{margin:0 0 22px;color:#60746b;line-height:1.7}label{font-size:13px;font-weight:900;color:#34473d}input{width:100%;min-width:0;padding:14px;border:1px solid #dbe9e2;border-radius:10px;margin:7px 0 0;font:inherit;background:#fbfdfc;overflow:visible;text-overflow:clip}input:focus{outline:0;border-color:#0f9d58;box-shadow:0 0 0 3px rgba(15,157,88,.13);background:white}.email-row{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:12px;align-items:end;margin-bottom:14px}.email-field{min-width:0}.btn{border:0;border-radius:10px;background:#0f9d58;color:white;font-weight:900;cursor:pointer;padding:14px 16px;min-height:50px}.btn:disabled{opacity:.55;cursor:not-allowed}.full{width:100%}.msg{display:none;padding:12px;border-radius:10px;margin-bottom:14px;font-weight:800}.msg.show{display:block}.error{background:#fff1f1;color:#b42318}.success{background:#eaf8f0;color:#067244}.hidden{display:none}.links{text-align:center;margin-top:16px}.links a{color:#067244;font-weight:900;text-decoration:none}.legal{font-size:12px;color:#60746b;line-height:1.6;margin-top:16px}@media(max-width:560px){body{padding:16px;align-items:flex-start}.card{padding:24px 18px;margin-top:18px}.email-row{grid-template-columns:1fr;gap:10px}.email-row .btn{width:100%}h1{font-size:27px}}
</style>
</head>
<body>
<main class="card">
    <div class="logo"><img src="{{ url_for('static', filename='logo-banner.png') }}" alt="Healthify"></div>
    <h1>Create your Healthify account</h1>
    <p class="sub">Verify your email first, then create a secure password.</p>
    <div class="msg" id="message"></div>
    <div class="email-row">
        <div class="email-field"><label>Email ID</label><input id="email" type="email" required placeholder="you@example.com" autocomplete="email"></div>
        <button class="btn" id="sendOtpBtn" onclick="sendOtp()" disabled>Verify Email</button>
    </div>
    <div id="otpBox" class="hidden">
        <label>6-digit OTP</label>
        <input id="otp" inputmode="numeric" maxlength="6" placeholder="Enter OTP">
        <button class="btn full" onclick="verifyOtp()">Verify OTP</button>
    </div>
    <form id="accountForm" class="hidden" onsubmit="createAccount(event)">
        <label>Password</label>
        <input id="password" type="password" required placeholder="Minimum 8 characters">
        <label>Confirm Password</label>
        <input id="confirm_password" type="password" required placeholder="Repeat password">
        <button class="btn full" type="submit">Create Account</button>
    </form>
    <div class="links"><a href="/login">Already have an account?</a></div>
    <p class="legal">Healthify provides health awareness only and does not provide diagnosis, treatment, or emergency care.</p>
</main>
<script>
const email=document.getElementById("email"),btn=document.getElementById("sendOtpBtn"),msg=document.getElementById("message");
function show(text,type){msg.textContent=text;msg.className="msg show "+type;}
email.addEventListener("input",()=>{btn.disabled=!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email.value.trim());});
async function sendOtp(){
    btn.disabled=true;show("Sending OTP...","success");
    const res=await fetch("/signup-send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value.trim()})});
    const data=await res.json();
    if(res.ok){show(data.message||"OTP sent.","success");document.getElementById("otpBox").classList.remove("hidden");}
    else{show(data.message||"OTP failed.","error");btn.disabled=false;}
}
async function verifyOtp(){
    const otp=document.getElementById("otp").value.trim();
    if(otp.length<4){show("Enter OTP first.","error");return;}
    const res=await fetch("/signup-verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({otp})});
    const data=await res.json();
    if(res.ok){show(data.message||"Email verified.","success");document.getElementById("accountForm").classList.remove("hidden");document.getElementById("otpBox").classList.add("hidden");email.disabled=true;}
    else show(data.message||"Invalid OTP.","error");
}
async function createAccount(e){
    e.preventDefault();
    const password=document.getElementById("password").value,confirm_password=document.getElementById("confirm_password").value;
    const res=await fetch("/create-account",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password,confirm_password})});
    const data=await res.json();
    if(res.ok){show(data.message||"Account created.","success");setTimeout(()=>window.location.replace("/login"),1000);}
    else show(data.message||"Account creation failed.","error");
}
</script>
</body>
</html>
