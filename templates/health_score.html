<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Health Score | Healthify</title>
<style>
*{box-sizing:border-box}:root{--green:#0f9d58;--dark:#10201a;--muted:#60746b;--line:#dbe9e2}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#f7fbf8,#edf7f2);color:var(--dark)}.wrap{width:min(980px,100%);margin:auto;padding:30px 16px 70px}.hero{background:white;border:1px solid var(--line);border-radius:14px;padding:28px;box-shadow:0 18px 50px rgba(16,32,26,.08)}h1{margin:0 0 8px;font-size:34px;color:#0f9d58}.sub{color:var(--muted);line-height:1.7;margin:0}.form{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{background:#fbfdfc;border:1px solid var(--line);border-radius:12px;padding:16px}label{font-size:13px;font-weight:900;color:#34473d}input,select{width:100%;padding:13px;margin-top:8px;border:1px solid var(--line);border-radius:10px;font:inherit;background:white}.wide{grid-column:1/-1}.hidden{display:none}.btn{width:100%;padding:16px;border:0;border-radius:12px;font-size:17px;font-weight:950;cursor:pointer;color:white;background:linear-gradient(90deg,#0f9d58,#22c97a)}.safe{margin-top:18px;background:#fff8e7;color:#73510d;border:1px solid #f4dfad;border-radius:12px;padding:14px;line-height:1.6;font-size:13px}@media(max-width:760px){.form{grid-template-columns:1fr}h1{font-size:28px}}
</style>
</head>
<body>
{% include 'header.html' %}
<main class="wrap"><section class="hero">
<h1>Quick Health Score</h1>
<p class="sub">A fast daily wellness indicator based on sleep, hydration, activity, age, and current symptoms.</p>
<form class="form" method="POST" action="/calculate-score" onsubmit="document.getElementById('hfLoader')?.classList.add('open')">
<div class="field"><label>Age</label><input type="number" name="age" required min="1" max="122"></div>
<div class="field"><label>Sleep Hours</label><select name="sleep"><option value="8">8+ hours</option><option value="7">7 hours</option><option value="6">6 hours</option><option value="5">Less than 6</option></select></div>
<div class="field"><label>Daily Water Intake</label><select name="water"><option value="3">3+ litres</option><option value="2">2 litres</option><option value="1">Less than 2 litres</option></select></div>
<div class="field"><label>Physical Activity</label><select name="activity"><option value="high">Active</option><option value="medium">Moderate</option><option value="low">Low</option></select></div>
<div class="field wide"><label>Any Symptoms Today?</label><select name="symptoms" id="symptomsSelect" onchange="toggleSymptoms()"><option value="none">No</option><option value="yes">Yes</option></select><input type="text" name="symptom_detail" id="symptomDetail" class="hidden" placeholder="Describe symptoms: fever, headache, pet dard, stress, weakness..."></div>
<div class="wide"><button class="btn" type="submit">Calculate Health Score</button></div>
</form>
<div class="safe">This score is for awareness and self-reflection only. It is not a medical diagnosis.</div>
</section></main>
<script>
function toggleSymptoms(){const select=document.getElementById("symptomsSelect"),box=document.getElementById("symptomDetail");if(select.value==="yes"){box.classList.remove("hidden");box.required=true;}else{box.classList.add("hidden");box.required=false;box.value="";}}
</script>
</body>
</html>
