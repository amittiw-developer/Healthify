<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyzing • Healthify</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    overflow:hidden;
    font-family:"Segoe UI";
    color:white;
}

/* 🌈 BACKGROUND GLOW */
.bg-glow{
    position:absolute;
    width:900px;
    height:900px;
    background:radial-gradient(circle, rgba(0,255,150,0.15), transparent 60%);
    filter:blur(180px);
    animation:pulse 6s ease-in-out infinite;
}

/* FLOATING ORB */
.orb{
    position:absolute;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(0,255,200,0.2), transparent 70%);
    filter:blur(140px);
    animation:float 8s ease-in-out infinite;
}

/* ✨ PARTICLES */
.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:#00ffcc;
    border-radius:50%;
    opacity:.6;
    animation:rise linear infinite;
}

/* MAIN BOX */
.box{
    position:relative;
    padding:55px 90px;
    border-radius:26px;
    background:rgba(20,20,20,0.6);
    backdrop-filter:blur(25px);
    text-align:center;
    z-index:2;
    box-shadow:0 0 40px rgba(0,255,150,0.15);
}

/* 🌈 BORDER MAGIC */
.box::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:26px;
    background:linear-gradient(120deg,#00ffcc,#00ff88,#00ccff,#00ffcc);
    background-size:500%;
    animation:move 7s linear infinite;
    z-index:-1;
}

.box::after{
    content:"";
    position:absolute;
    inset:2px;
    background:#0a0a0a;
    border-radius:24px;
    z-index:-1;
}

/* TITLE */
.title{
    font-size:26px;
    margin-top:14px;
    letter-spacing:.8px;

    background:linear-gradient(90deg,#00ffcc,#00ff88);
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

/* SUBTEXT */
.sub{
    margin-top:10px;
    font-size:13px;
    color:#888;
}

/* RING LOADER */
.ring{
    margin:auto;
    width:65px;
    height:65px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.1);
    border-top:3px solid #00ffcc;
    animation:spin 1s linear infinite;
}

/* DOTS */
.dots{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:8px;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#00ffcc;
    animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

/* AI TEXT */
.ai-text{
    margin-top:15px;
    font-size:13px;
    color:#00ffcc;
    opacity:.7;
    animation:fade 1.5s infinite alternate;
}

/* ANIMATIONS */
@keyframes move{
    0%{background-position:0%}
    100%{background-position:500%}
}

@keyframes bounce{
    0%,80%,100%{transform:scale(.4);opacity:.3}
    40%{transform:scale(1);opacity:1}
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

@keyframes pulse{
    0%,100%{transform:scale(1);opacity:.5}
    50%{transform:scale(1.3);opacity:.9}
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-60px)}
}

@keyframes rise{
    0%{transform:translateY(0);opacity:0}
    30%{opacity:1}
    100%{transform:translateY(-900px);opacity:0}
}

@keyframes fade{
    from{opacity:.3}
    to{opacity:1}
}

</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="orb"></div>

<!-- PARTICLES -->
<script>
for(let i=0;i<45;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.top="100vh";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

<div class="box">

    <div class="ring"></div>

    <div class="title" id="aiTitle">Analyzing your health...</div>
    <div class="sub">AI is deeply understanding your symptoms</div>

    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="ai-text">Healthify AI is thinking...</div>

</div>

<script>

// 🔥 RANDOM TIME (2s–5s)
const delay = Math.floor(Math.random() * 3000) + 2000;

// 🔥 TEXT ROTATION (PREMIUM FEEL)
const texts = [
    "Analyzing your health...",
    "Understanding your symptoms...",
    "Generating AI insights...",
    "Preparing your report..."
];

let i = 0;
setInterval(()=>{
    document.getElementById("aiTitle").innerText = texts[i % texts.length];
    i++;
},1200);

// 🔥 REDIRECT
setTimeout(()=>{
    window.location.replace("/report");
}, delay);

// 🔥 BACK FIX
history.replaceState(null,null,location.href);
window.onpopstate=function(){
    window.location.href="/home";
}

</script>

</body>
</html>
