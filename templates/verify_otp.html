<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP | Healthify</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#f7fbf8,#e5f5ed);display:flex;align-items:center;justify-content:center;padding:24px;color:#10201a}.card{width:min(460px,100%);background:white;border:1px solid #dbe9e2;border-radius:10px;padding:34px;text-align:center;box-shadow:0 24px 70px rgba(16,32,26,.13);animation:up .4s ease}@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}img{height:48px;margin-bottom:18px}h1{margin:0 0 8px}.sub{color:#60746b;line-height:1.7}input{width:100%;padding:15px;border:1px solid #dbe9e2;border-radius:8px;margin:16px 0;font-size:18px;text-align:center;letter-spacing:.12em}.btn{width:100%;padding:14px;border:0;border-radius:8px;background:#0f9d58;color:white;font-weight:900;cursor:pointer}
</style>
</head>
<body>
<main class="card">
    <img src="{{ url_for('static', filename='logo-banner.png') }}" alt="Healthify">
    <h1>Verify your email</h1>
    <p class="sub">Enter the OTP sent to your email to continue securely.</p>
    <form method="POST" action="/verify-otp">
        <input name="otp" placeholder="OTP" required>
        <button class="btn" type="submit">Verify and Continue</button>
    </form>
</main>
</body>
</html>
