<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthify Help Center</title>
<style>
*{box-sizing:border-box;min-width:0}
:root{--ink:#0d2219;--muted:#657a70;--line:#dcebe3;--green:#0f9d58;--green2:#15b978;--soft:#f4fbf7;--card:#ffffff;--shadow:0 18px 55px rgba(13,34,25,.08)}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 0%,rgba(15,157,88,.13),transparent 30%),linear-gradient(180deg,#f9fdfb,#edf8f2)}
button,input,textarea{font-family:inherit}
.launch{position:fixed;inset:0;z-index:8000;display:grid;place-items:center;background:radial-gradient(circle at 50% 42%,rgba(15,157,88,.25),transparent 28%),linear-gradient(145deg,#06100d,#10251c 55%,#030604);transition:opacity .38s ease,visibility .38s ease}
.launch.hide{opacity:0;visibility:hidden;pointer-events:none}
.launch-card{padding:22px 26px;border:1px solid rgba(112,255,180,.28);border-radius:22px;background:rgba(255,255,255,.045);box-shadow:0 0 64px rgba(15,157,88,.25);text-align:center;animation:enter .9s ease both}
.launch-card b{display:block;font-size:clamp(26px,6vw,52px);line-height:1.18;padding-bottom:8px;background:linear-gradient(90deg,#fff,#8affc2,#35d1ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.launch-card span{color:#d8f4e5;font-weight:850}
.wrap{width:min(1180px,100%);margin:auto;padding:28px 16px 78px}
.hero{position:relative;text-align:center;background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(246,252,249,.92));border:1px solid var(--line);border-radius:20px;padding:28px 18px 24px;box-shadow:var(--shadow);overflow:hidden}
.hero:before{content:"";position:absolute;inset:auto 14% -80px 14%;height:120px;background:radial-gradient(circle,rgba(15,157,88,.18),transparent 65%);pointer-events:none}
h1{position:relative;margin:0 0 10px;padding:0 0 6px;font-size:clamp(30px,4.8vw,54px);line-height:1.22;background:linear-gradient(90deg,#0a2d1d,#0f9d58,#22c7a0);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 26px rgba(15,157,88,.12);overflow:visible}
.hero p{position:relative;margin:0 auto;color:var(--muted);line-height:1.65;max-width:760px;font-size:clamp(14px,2vw,16px)}
.lang{position:relative;margin:20px auto 0;display:inline-flex;gap:6px;padding:6px;border:1px solid var(--line);border-radius:999px;background:#f7fcf9;box-shadow:inset 0 0 18px rgba(15,157,88,.04)}
.lang button{border:0;background:transparent;border-radius:999px;padding:10px 15px;font-weight:950;color:#067244;cursor:pointer;transition:.2s ease}
.lang button.active{background:linear-gradient(135deg,var(--green),var(--green2));color:white;box-shadow:0 10px 24px rgba(15,157,88,.2)}
.panel{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);max-width:100%;overflow:hidden}
.main-view{margin-top:18px}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px;font-size:21px}.section-title span{font-size:13px;color:var(--muted);font-weight:700}
.categories{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.cat{position:relative;border:1px solid var(--line);background:linear-gradient(145deg,#fff,#f7fcf9);border-radius:16px;padding:15px 16px;text-align:left;cursor:pointer;transition:.2s ease;min-height:86px}
.cat:hover,.cat.active{border-color:#9dddbc;box-shadow:0 16px 34px rgba(15,157,88,.12);transform:translateY(-2px)}
.cat b{display:flex;align-items:center;gap:9px;color:#067244;font-size:15px}.cat em{font-style:normal;width:32px;height:32px;display:grid;place-items:center;border-radius:12px;background:#eaf8f0;color:#067244;font-size:13px}
.cat span{display:block;margin:9px 0 0 41px;color:var(--muted);font-size:13px;line-height:1.45}
.inline-qs{display:none;grid-column:1/-1;border:1px solid #d9ecdf;background:linear-gradient(145deg,#f8fdfb,#eef8f3);border-radius:18px;padding:13px;animation:rise .24s ease}
.inline-qs.open{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.q{border:1px solid #dbe9e2;border-radius:14px;background:white;padding:13px 14px;text-align:left;font-weight:850;color:#15291f;cursor:pointer;line-height:1.42;transition:.18s ease;min-height:50px}
.q:hover{border-color:#9dddbc;color:#067244;box-shadow:0 12px 25px rgba(15,157,88,.09)}
.chat-view{display:none!important;margin-top:18px}.chat-view.open{display:flex!important;animation:rise .3s ease}
body.help-chat-active .hero{display:none}
body.help-chat-active{height:100dvh;overflow:hidden}
body.help-chat-active .wrap{height:calc(100dvh - 82px);padding:14px 12px;display:flex;align-items:stretch;justify-content:center}
body.help-chat-active .chat-view.open{margin-top:0}
.chat-shell{width:min(980px,100%);height:100%;min-height:0;display:flex;flex-direction:column}
.chat-head{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding-bottom:13px;margin-bottom:13px}
.back{border:1px solid #ccebd9;background:#eef8f3;color:#067244;border-radius:13px;padding:10px 13px;font-weight:950;cursor:pointer}
.support-title{text-align:center}.support-title b{display:block;color:#067244;font-size:18px}.support-title span{display:block;margin-top:3px;color:var(--muted);font-size:13px}
.chat-window{flex:1;display:flex;flex-direction:column;gap:11px;overflow-y:auto;overflow-x:hidden;min-height:0;padding:8px 6px 12px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#cde8d8 transparent;overscroll-behavior:contain}
.msg{width:auto;max-width:min(680px,80%);padding:13px 15px;border-radius:18px;line-height:1.55;font-size:15px;box-shadow:0 8px 22px rgba(13,34,25,.04);overflow-wrap:anywhere;word-break:break-word}
.user{align-self:flex-end;background:#0d2219;color:white;border-bottom-right-radius:8px}
.bot{align-self:flex-start;background:#f2fbf6;border:1px solid #d5eadf;color:#16372a;border-bottom-left-radius:8px}
.bot strong{color:#067244}.typing{display:inline-flex;gap:4px}.typing i{width:7px;height:7px;border-radius:50%;background:#0f9d58;animation:pulse .8s infinite}.typing i:nth-child(2){animation-delay:.13s}.typing i:nth-child(3){animation-delay:.26s}
.choice-box,.feedback{margin-top:12px;border-top:1px solid var(--line);padding-top:12px;width:100%;max-width:100%;overflow:hidden}.choice-title{font-weight:950;color:#067244;overflow-wrap:anywhere}.chips,.fb-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;max-width:100%;align-items:center}
.chip{max-width:100%;white-space:normal;border:1px solid #ccebd9;background:white;color:#067244;border-radius:999px;padding:8px 12px;font-weight:850;cursor:pointer;text-decoration:none;transition:.18s ease}.chip:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,157,88,.1)}
.chip.dark{background:#10201a;color:white;border-color:#10201a}.chip.backchip{background:#eef8f3}
.fb-row button{max-width:100%;border:1px solid transparent;border-radius:13px;padding:9px 14px;font-weight:950;cursor:pointer;transition:.18s ease}.yes{background:#e8f8ef;color:#067244}.yes.on{background:#0f9d58;color:white;box-shadow:0 0 22px rgba(15,157,88,.28)}.no{background:#fff3f0;color:#b42318}.no.on{background:#ef4444;color:white;box-shadow:0 0 22px rgba(239,68,68,.25)}
.feel button{background:#fff8df;color:#996800;font-size:19px;min-width:45px;box-shadow:inset 0 0 0 1px rgba(255,204,85,.18)}
.feel button.on{background:#fff1b8;border-color:#ffd166;box-shadow:0 0 0 3px rgba(255,209,102,.25),0 10px 24px rgba(255,178,35,.22);animation:emojiPop .42s ease both}
.msg .inline-qs.open{grid-template-columns:1fr;max-height:260px;overflow:auto;background:rgba(255,255,255,.6);padding:10px}
.msg .q{min-height:auto;padding:11px 12px;font-size:14px}
.feedback textarea{display:block;width:100%;max-width:100%;min-height:62px;margin-top:10px;border:1px solid var(--line);border-radius:13px;padding:12px;font:inherit;resize:vertical;background:white}.submit{background:#0f9d58!important;color:white!important}.thanks{margin-top:10px;color:#067244;font-weight:950;overflow-wrap:anywhere}.legal-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
@keyframes enter{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}@keyframes pulse{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}@keyframes emojiPop{0%{transform:scale(.88)}45%{transform:scale(1.18) rotate(-4deg)}100%{transform:scale(1.05)}}
@media(max-width:900px){.wrap{padding:20px 12px 62px}.hero,.panel{border-radius:16px;padding:17px}.categories,.inline-qs.open{grid-template-columns:1fr}.cat span{margin-left:0}.msg{max-width:90%;font-size:14px}.bot{max-width:92%}.user{max-width:82%}.chat-head{grid-template-columns:auto minmax(0,1fr)}.chat-head:after{display:none}.support-title{text-align:left}body.help-chat-active .wrap{height:calc(100dvh - 72px);padding:10px}.chat-shell{padding:12px}.chat-head{margin-bottom:8px;padding-bottom:10px}.support-title b{font-size:15px}.support-title span{font-size:12px}h1{font-size:clamp(28px,10vw,42px)}}
@media(max-width:480px){.wrap{padding-inline:10px}.hero,.panel{padding:14px}.lang{width:100%;justify-content:center}.lang button{padding:9px 10px;font-size:13px}.section-title{display:block}.section-title span{display:block;margin-top:4px}.msg{font-size:13px;padding:10px 11px;border-radius:15px;line-height:1.48}.bot{max-width:92%}.user{max-width:78%}.hero p{font-size:14px}.chat-shell{padding:10px}.chat-head{gap:9px}.back{padding:8px 10px;border-radius:11px;font-size:12px}.support-title b{font-size:14px}.support-title span{font-size:11px;line-height:1.35}.choice-box,.feedback{margin-top:10px;padding-top:10px}.choice-title{font-size:13px}.fb-row button,.chip{padding:7px 11px;font-size:12px}.feel{display:grid;grid-template-columns:repeat(5,minmax(34px,1fr));gap:6px;width:100%}.feel button{min-width:0;padding:8px 5px}.feedback textarea{min-height:56px;font-size:13px}.submit{width:auto}.chips{display:flex;flex-wrap:wrap}.chip{width:auto;border-radius:999px}.msg .inline-qs.open{max-height:190px}.msg .q{font-size:12px;padding:9px 10px}.thanks{font-size:13px}}
@media(max-width:360px){body.help-chat-active .wrap{padding:8px}.chat-shell{padding:8px}.msg{max-width:94%;font-size:12.5px}.user{max-width:82%}.fb-row button,.chip{font-size:11.5px;padding:7px 9px}.support-title span{display:none}}
</style>
</head>
<body>
<div class="launch" id="launch"><div class="launch-card"><b>Healthify Help Center</b><span>Premium support experience</span></div></div>
{% include 'header.html' %}
<main class="wrap">

        <h1>Healthify Help Center</h1>

    <section class="main-view panel" id="mainView">

</main>

setTimeout(()=>requestAnimationFrame(()=>{
els.chat.scrollTo({top:els.chat.scrollHeight,behavior:"smooth"});
els.chat.lastElementChild?.scrollIntoView({behavior:"smooth",block:"end",inline:"nearest"});
}),delay);
}
function enterChat(cat,qid){document.body.classList.add("help-chat-active");els.main.style.display="none";els.chatView.classList.add("open");ask(cat,qid);setTimeout(()=>els.chatView.scrollIntoView({behavior:"smooth",block:"start"}),50)}
function showMain(){document.body.classList.remove("help-chat-active");els.chatView.classList.remove("open");els.main.style.display="block";setTimeout(()=>els.main.scrollIntoView({behavior:"smooth"}),50)}
function ask(cat,qid){chatStarted=true;els.chat.insertAdjacentHTML("beforeend",`<div class="msg user">${esc(qText(qid))}</div><div class="msg bot" id="typing"><span class="typing"><i></i><i></i><i></i></span></div>`);scrollChat();setTimeout(()=>{document.getElementById("typing")?.remove();els.chat.insertAdjacentHTML("beforeend",`<div class="msg bot"><strong>${esc(qText(qid))}</strong><br>${esc(answerText(qid))}${cat==="legal"?legalLinks():""}${feedbackHtml()}${morePrompt()}</div>`);scrollChat();},520)}
function legalLinks(){return `<div class="legal-links"><a class="chip" href="/about">About Us</a><a class="chip" href="/privacy-policy">Privacy Policy</a><a class="chip" href="/terms">Terms</a></div>`}
function feedbackHtml(){const p=t();return `<div class="feedback"><div class="choice-title">${esc(p.helpful)}</div><div class="fb-row"><button class="yes" onclick="fbYes(this)">${esc(p.yes)}</button><button class="no" onclick="fbNo(this)">${esc(p.no)}</button></div><div class="fbBox"></div></div>`}
function chooseFeel(btn){btn.parentElement.querySelectorAll("button").forEach(x=>x.classList.remove("on"));btn.classList.add("on");scrollChat()}
function fbYes(btn){const box=btn.closest(".feedback").querySelector(".fbBox");btn.classList.add("on");btn.parentElement.querySelector(".no").classList.remove("on");box.innerHTML=`<div class="choice-title" style="margin-top:10px">${esc(t().rate)}</div><div class="fb-row feel">${["😟","😐","🙂","😊","😍"].map(x=>`<button onclick="chooseFeel(this)">${x}</button>`).join("")}</div><textarea placeholder="${esc(t().feedback)}"></textarea><div class="fb-row"><button class="submit" onclick="typeThanks(this)">${esc(t().submit)}</button></div>`;scrollChat()}
function fbNo(btn){const box=btn.closest(".feedback").querySelector(".fbBox");btn.classList.add("on");btn.parentElement.querySelector(".yes").classList.remove("on");box.innerHTML=`<div class="choice-title" style="margin-top:10px">${esc(t().need)}</div><textarea placeholder="${esc(t().feedback)}"></textarea><div class="fb-row"><button class="submit" onclick="typeThanks(this)">${esc(t().submit)}</button></div>`;scrollChat()}
function typeThanks(btn){const box=btn.closest(".fbBox");box.innerHTML=`<div class="thanks"></div>`;const el=box.querySelector(".thanks"),txt=t().thanks;let i=0;(function type(){el.textContent=txt.slice(0,i++);scrollChat();if(i<=txt.length)setTimeout(type,20)})()}
function morePrompt(){const p=t();return `<div class="choice-box"><div class="choice-title">${esc(p.moreQ)}</div><div class="chips"><button class="chip dark" onclick="showAskChoices(false,this)">${esc(p.yes)}</button><button class="chip" onclick="noMore(this)">${esc(p.no)}</button></div><div class="askChoices"></div></div>`}
function showAskChoices(all,btn){const target=btn.closest(".choice-box").querySelector(".askChoices"),list=all?CATS:CATS.slice(0,5);target.innerHTML=`<div class="chips">${all?`<button class="chip backchip" onclick="showAskChoices(false,this)">${esc(t().back)}</button>`:""}${list.map(([id,abbr])=>`<button class="chip" onclick="showCatQuestions('${id}',this)">${abbr} ${esc(catText(id)[0])}</button>`).join("")}${!all?`<button class="chip" onclick="showAskChoices(true,this)">${esc(t().more)}</button>`:""}</div>`;scrollChat()}
function showCatQuestions(cat,btn){const box=btn.closest(".askChoices");box.innerHTML=`<div class="chips"><button class="chip backchip" onclick="showAskChoices(false,this)">${esc(t().back)}</button></div><div class="inline-qs open" style="margin-top:8px">${(QUESTION_IDS[cat]||[]).map(q=>`<button class="q" onclick="ask('${cat}','${q}')">${esc(qText(q))}</button>`).join("")}</div>`;scrollChat()}
function noMore(btn){btn.closest(".choice-box").querySelector(".askChoices").innerHTML=`<div class="thanks">${esc(t().thanks)}</div>`;scrollChat()}
document.querySelectorAll(".lang button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".lang button").forEach(x=>x.classList.remove("active"));b.classList.add("active");lang=b.dataset.lang;renderCats();});
window.addEventListener("load",()=>setTimeout(()=>document.getElementById("launch").classList.add("hide"),950));
renderCats();
</script>
</body>
</html>
